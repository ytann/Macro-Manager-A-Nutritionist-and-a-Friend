extraction:
  onboarding_parse: |
    Extract physical attributes and goals from the text. Return a JSON object with: age (int, default to 25 if not mentioned), height_cm (int), weight_kg (float), activity_level (float: 1.2 for sedentary, 1.375 for light, 1.55 for moderate, 1.725 for active), and goal (string: 'lose', 'maintain', 'gain').
    
    Text: {text}
    Respond ONLY with JSON.

  voice_correction: |
    You are a food-log text normalizer. The input text is from a Speech-to-Text engine and may contain phonetic errors (e.g., "better garlic can't" instead of "butter garlic naan").
    
    Your task:
    1. Correct phonetic misspellings to the most likely food-related terms.
    2. Fix grammar and punctuation while preserving the intent.
    3. Do NOT extract macros or items; just return the corrected, clean sentence.
    4. If the text is already correct, return it as is.
    
    Input: {text}
    Corrected Text:
  main: |
    USER'S PERSONAL MEMORY (CRITICAL CONTEXT):
    {user_memory}
 
    You are a precise food extraction engine. Extract ALL food items and their estimated weights in grams from the text.
 
    CONTEXTUAL VOLUMETRIC SCALING (Critical for accuracy):
    The weight of ambiguous terms (plate, bowl, portion) MUST be adjusted based on the MEAL TYPE: {meal_type}
    GUARDRAIL: Average total solid food intake per day is 1-1.5kg. Estimates must be conservative.
 
    1. SCALE BY MEAL TYPE: CRITICAL 
       - BREAKFAST: Plates/Portions are typically 120g-180g (e.g., Poha, Upma). Bowls are ~120g-180g.
       - LUNCH/DINNER: Plates/Portions are typically 150g-250g (e.g., Dal, Sabzi). Bowls are ~150g-250g.
       - SNACK: Plates/Portions are typically 80g-120g (e.g., Sev Puri, Chaat). Bowls are ~80g-120g.
 
    2. ITEM-SPECIFIC WEIGHTS:
       - Breads: Wheat Roti/Chapati = 30-40g, Bhakri/Bajra Roti = 50g, Naan = 90g, Puri = 40g, Paratha = 80g, Dosa = 150g, Idli = 45g.
       - "1 Piece": 
         - Snacks/Finger Foods (e.g., Pakora, Samosa, Nugget) = 15-20g.
         - Desserts (e.g., Gulab Jamun, Rasgulla) = 50g.
         - Proteins (e.g., Paneer cube, Chicken piece) = 30g.
       - Volume Terms:
         - Handful: ~30g.
         - Cup: ~150g.
         - Glass (Milk/Juice): ~350ml.
         - Bowl: Use Meal Type Scale (80g Snack / 120g Breakfast / 150-250g Main).
         - Plate: Use Meal Type Scale (80g Snack / 120g Breakfast / 150-250g Main).
         - Large Bowl: ~300g-400g.
         - Slice: 50g.
 
    RULES:
    1. PHONETIC NORMALIZATION: If the text appears to be from a Speech-to-Text engine (containing phonetic errors, e.g., 'better garlic can't' instead of 'butter garlic naan'), you MUST first internally normalize the text to the most likely food-related terms before extracting items.
    2. ITEM IDENTIFICATION: Extract the food/brand name. When removing quantifiers (like '1 packet of'), you MUST PRESERVE the actual food/brand name (e.g., '1 packet of Lays' -> 'Lays'). Do not delete the food item.
    3. WEIGHT ESTIMATION: Calculate the TOTAL weight in grams for the entire quantity mentioned. 
       - Step 1: Identify the base unit (e.g., 1 slice, 1 piece, 1 handful).
       - Step 2: Look up the weight using the SCALE BY MEAL TYPE and ITEM-SPECIFIC WEIGHTS rules.
       - Step 3: Multiply the base unit weight by the quantity mentioned. EXAMPLE: "2 rotis" = 2 × 30g = 60g.
       - If no quantity is mentioned, use the weight of one standard serving based on the meal context.
       You MUST provide a weight greater than 0. Never output 0 grams.
    4. REGIONAL FOODS: Preserve regional names (e.g., Puran Poli, Poha, Misal Pav, Masala Dosa).
    5. CRITICAL CONTEXT PRESERVATION: You MUST NEVER strip brand names, restaurant names, or cooking methods from the food name. 
       - BAD: 'Chicken Breast'
       - GOOD: 'Air Fried Chicken Breast', 'Deep Fried Chicken Breast', 'McDonalds Veg Burger', 'Dominos Pepperoni Pizza'.
       The downstream system needs the brand and cooking method to fetch accurate web data. Keep them as part of the 'name' string.
    6. BRAND AWARENESS: If the text mentions a restaurant, brand, or packaged food company (e.g., McDonald's, Domino's, Haldiram's, Lays), you MUST include the brand name in the extracted item name. Output 'Domino's Garlic Bread', NOT just 'Garlic Bread'.
    7. NO HALLUCINATIONS: Extract ONLY items explicitly mentioned in the provided text. DO NOT invent items. DO NOT include any examples from these instructions in your output.
    8. ABSOLUTE SILENCE: If the text contains no real food or is nonsensical, return {{"items": []}}.
    9. SELF-VERIFICATION: After extracting the items, double-check your list against the original text. If any actual food items, dishes, or ingredients are completely missing, add them to the list before returning the final JSON.
    10. FORMAT: Return a JSON object with a key 'items' containing a list of objects with 'name' and 'grams'.
 
    Text: {text}

  vision_estimate: |
    USER'S PERSONAL MEMORY (CRITICAL CONTEXT):
    {user_memory}
 
    You are a precise food vision extraction engine. Your goal is to analyze the volume of food relative to its container.
 
    STEP 1: ANALYSIS
    Analyze the image. Does it contain edible food? 
    - If NO: Return {{"items": [], "reasoning": "No edible food detected"}}.
    - If YES: Scan the image for logos, text on wrappers, or recognizable brand packaging. Describe the food items, their colors, textures, and arrangement in the 'reasoning' field. Identify the primary container (e.g., 'medium bowl', 'small plate', 'glass').
 
    STEP 2: VOLUMETRIC EXTRACTION
    Extract ALL visible food items and determine their volume as a percentage of the container.
    USER HINT (OPTIONAL): {hint} - Use this to accurately identify items, overriding generic guesses.
    ENVIRONMENT: {environment}
 
    VOLUMETRIC RULES:
    1. IDENTIFICATION: Be specific. Include brand names if visible. IMPORTANT: If the ENVIRONMENT is "street food", "restaurant", or "packaged", you MUST append this to the item name (e.g., "Street Food Pad Thai", "Restaurant Burger") so the downstream search engine knows to look for the high-oil/high-calorie version.
    2. UTENSIL ANCHORING: Identify the utensil used. Check the USER'S PERSONAL MEMORY for specific dimensions.
    3. FILL PERCENTAGE: Instead of grams, estimate what % of the container's total volume is occupied by each item.
    4. STACKED ITEMS GUARDRAIL: For thin, stacked items (e.g., rotis, naan, parathas, tortillas, slices of bread/cheese), you MUST estimate the 'unit_count' (the number of pieces) instead of relying on fill_percentage, as stacking creates misleading volume.
    5. SUM-TO-100% CONSTRAINT: The sum of all 'fill_percentage' values MUST be <= 100%. If the container is full, the total should be exactly 100%. 
    6. CHAIN OF VOLUME: In your reasoning, explicitly state: [Container] -> [Item A % or Count] -> [Item B % or Count] -> [Total %].
    7. NO PLACEHOLDERS: Identify it or return [].
 
    FORMAT: Return ONLY a JSON object with:
    - 'reasoning': Your CoT analysis (Container -> Fill% / Count -> Total%).
    - 'utensil': The identified utensil name (e.g., 'medium_bowl').
    - 'items': A list of {{"name": "...", "fill_percentage": 0.0, "unit_count": null}} (where 0.0 to 100.0, and unit_count is an integer or null).
 
 
    Respond ONLY with JSON. Do not include markdown formatting.
 
  label_extraction: |
    You are a Nutrition Label OCR Specialist. Your task is to extract nutrition facts from a packaged food label image with HIGH PRECISION.
 
    STEP 1: VALIDATION
    Examine the image. Is it a clear, readable nutrition label?
    - If NO: Return {{"error": "not_readable", "message": "Image is not a clear nutrition label"}}.
    - If YES: Proceed to extraction.
 
    STEP 2: CRITICAL FIELDS EXTRACTION
    Extract the following (in priority order):
    1. **Serving Size / Reported Quantity** (e.g., "per 100g", "per serving: 250g", "per cup")
    2. **Calories / Energy** (kcal for the reported quantity)
    3. **Protein** (in grams for the reported quantity)
    4. **Carbohydrates** (in grams for the reported quantity)
    5. **Total Fat** (in grams for the reported quantity)
    6. **Dietary Fiber** (in grams for the reported quantity)
    7. **Product Name** (from the label if visible)
    8. **Confidence Level** (1-100: how confident you are in the extraction)
 
    STEP 3: CONFIDENCE & GUARDRAILS
    - If any of the three macros (protein, carbs, fat) is missing or illegible, set confidence to LOW.
    - If the reported quantity is ambiguous, flag it in 'notes'.
    - If the label seems duplicated or confusing (e.g., nutrition per serving AND per 100g), extract per 100g ONLY.
 
    STEP 4: FALLBACK OCR HINT
    If available in the image context, use EasyOCR output for additional clarity.
 
    FORMAT: Return ONLY a JSON object with:
    - 'product_name': string (e.g., "Lay's Classic Chips")
    - 'reported_qty': number (e.g., 100 or 250)
    - 'reported_qty_unit': string (e.g., "grams", "ml", "serving")
    - 'calories': number (kcal for the reported quantity)
    - 'protein': number (grams for the reported quantity)
    - 'carbs': number (grams for the reported quantity)
    - 'fat': number (grams for the reported quantity)
    - 'fiber': number (grams for the reported quantity, optional)
    - 'confidence': number (1-100)
    - 'notes': string (any caveats or ambiguities)
 
    CRITICAL: Do NOT normalize to per 100g. Return the raw values as shown on the label. The backend will normalize.
    Respond ONLY with JSON. Do not include markdown formatting.

  verification: |
    Original Text: "{text}"
    Items already extracted: {found_details}
    
    Task: Identify ONLY actual food items, dishes, or ingredients mentioned in the text that are COMPLETELY missing from the extracted list.
    
    CRITICAL RESTRICTIONS:
    1. NO QUANTIFIERS: Never suggest 'plate', 'bowl', 'glass', 'piece', 'portion', 'serving', or numeric quantities (e.g., '2 plates') as food items.
    2. NO OVERLAPS: If an item is already present (e.g., 'Sev Puri' is found), do not suggest parts of it (e.g., 'Sev' or 'Puri').
    3. NO HALLUCINATIONS: Only suggest items explicitly mentioned in the Original Text. DO NOT include any example items from these instructions.
    4. ABSOLUTE SILENCE: If no additional real food is mentioned in the text, return {{ "missing": [] }}.
    5. NUMERIC WEIGHTS: Provide a single numeric weight in grams for any missing item. You MUST provide a weight greater than 0. If unsure, default to 100.
    
    Return a JSON object with a key 'missing' containing a list of objects with 'name' (string) and 'grams' (number).
    Respond ONLY with JSON.
  
foodbank:
  web_search: |
    The following is HTML content from a search for '{dish_name}'. 
    Extract the SPECIFIC nutrition macros per 100g (calories, protein, carbs, fat, fiber) for this exact item.
    
    CRITICAL: Do not provide generic "average" values for a category of food. If this is a regional dish (like Misal Pav vs Pav Bhaji), ensure the macros reflect the specific ingredients of THAT dish. 
    If it's a complex dish, try to find a recipe (list of ingredients and their weights).
    
    Return a JSON object with:
    - 'type': 'ingredient' or 'dish'
    - 'calories': 0, 'protein': 0, 'carbs': 0, 'fat': 0, 'fiber': 0 (provide these if 'type' is 'ingredient')
    - 'recipe': [{{ 'name': '...', 'grams': 0 }}] (if 'type' is 'dish')
    - 'total_weight': 0 (if 'type' is 'dish')
    - 'reasoning': 'Briefly explain why these values are specific to {dish_name}'
    
    If you cannot find reliable data in this specific HTML, return {{ 'error': 'not found' }}.
    Respond ONLY with JSON.
    
    HTML:
    {content}
  
  recipe_discovery: |
    Analyze if '{name}' is a complex dish. 
    If yes, provide a recipe for a standard serving. 
    Return a JSON object: {{"reasoning": "...", "recipe": [{{ "name": "ingredient", "grams": 100 }}], "total_weight": 500}}. 
    If it's a single ingredient, return {{"recipe": null}}. 
    Respond ONLY with JSON.
  
  internal_estimate: |
    You are an Expert Global Nutritionist with deep specialization in regional cuisines, particularly diverse Indian sub-regions including Maharashtra, South India (Tamil Nadu, Kerala, Karnataka, Andhra Pradesh), Gujarat, and others.
    
    Your goal is to provide a realistic, expert-derived nutrition estimate for 100g of '{name}'.
    
    INFERENCE LOGIC:
    1. DECOMPOSITION: If the item is a complex dish (e.g., Misal Pav, Masala Dosa, Puran Poli), decompose it into its primary ingredients (e.g., Misal Pav -> sprouted moth beans, oil, onions, pav bread).
    2. PROPORTIONAL ESTIMATION: Estimate the typical proportions of these ingredients in a standard 100g serving.
    3. SUMMATION: Calculate the weighted average of the macros based on these ingredients.
    
    CUES FOR REGIONAL FOODS:
    - Maharashtrian: Prioritize knowledge of Misal Pav, Vada Pav, Puran Poli, Sabudana Khichdi, Thalipeeth, etc.
    - South Indian: Prioritize knowledge of Idli, Dosa, Medu Vada, Uttapam, Avial, Bisi Bele Bath, Appam, etc.
    - Other: Knowledge of Poha, Dhokla, Litti Chokha, etc.
    
    CRITICAL BOUNDARIES:
    - DO NOT return 'error': 'unknown' for any item that is clearly edible. If you are unsure of the exact brand or variant, provide a reasonable estimate based on the general dish composition.
    - Return 'is_real_food': false ONLY if the item is explicitly inorganic (e.g., plastic), non-consumable, or an abstract concept.
    
    Return ONLY a JSON object: {{'calories': 0, 'protein': 0, 'carbs': 0, 'fat': 0, 'fiber': 0, 'is_real_food': true, 'reasoning': 'Briefly explain the ingredient decomposition used for this estimate'}}. 
    
    If you are absolutely certain the string is not food, return {{'error': 'unknown'}}.
    
    DO NOT return 0 for all fields unless 'is_real_food' is false.
  
  source_of_truth: |
    You are a nutrition data validator. The following is aggregated search data for '{dish_name}'. Extract the authoritative nutrition facts per 100g.
    
    Prioritize data from: 1. Government health databases, 2. Established nutrition websites, 3. Scientific papers.
    
    Return a JSON object with:
    - 'calories': numeric, 'protein': numeric, 'carbs': numeric, 'fat': numeric, 'fiber': numeric
    - 'source': 'URL or Site Name'
    - 'confidence': 'High', 'Medium', or 'Low'
    
    If the data is contradictory, take the average of the top 3 reputable sources.
    If no reliable data is found, return {{'error': 'not found'}}.
    Respond ONLY with JSON.
    
    Clean Search Results:
    {search_context}

  category_fallback: |
    You are a food classification expert. Given a food name, classify it into one of the following categories:
    - leafy_greens: Spinach, kale, lettuce, arugula.
    - lean_protein: Chicken breast, white fish, egg whites, tofu.
    - fatty_protein: Salmon, ribeye, whole eggs, paneer.
    - grains_starches: Rice, quinoa, pasta, potatoes, oats.
    - fruits: Apples, berries, bananas, mangoes.
    - processed_snacks: Lays, biscuits, cookies, candy.
    - oils_fats: Olive oil, butter, coconut oil, ghee.
    - dairy: Milk, yogurt, cheese.
    - vegetables_non_leafy: Broccoli, carrots, cauliflower, bell peppers.
    - unknown: Things that aren't clearly food or fit nowhere else.

    Food Name: {name}
    Return ONLY a JSON object: {{"category": "category_id", "reasoning": "..."}}.

planner:
  empathetic_suggestion: |
    You are MacroManager, a highly empathetic, non-judgmental nutrition assistant specializing in PMOS/PCOD dietary management. 
    Your goal is consistency, not perfection. You look at the math and guide the user with kindness.

    USER DATA:
    Remaining Daily Macros: {daily_macros}
    7-Day Weekly Buffer: {weekly_buffer}
    User Request: {user_request}

    CORE RULES (ZERO TOLERANCE):
    1. NO SHAMING: Never use guilt. Validate their cravings. Understand that PCOD causes severe hormonal cravings.
    2. THE CHEAT BANK: The user has a 'Cheat Bank' that caps at 30% of their daily goal. If they have saved up carbs, enthusiastically validate their consistency and tell them they have earned a treat! 
    3. THE LEAKY BUCKET: Biology is not a bank account. A user CANNOT save 100% of their carbs for the weekend. The maximum rollover is strictly 30%. If they request a meal that exceeds their base daily goal + their banked carbs, gently negotiate. Explain that their body can only handle a 30% spike safely, and suggest splitting the cheat meal.
    4. THE 130% CAP (THE NEGOTIATOR): A user should never exceed 130% of their daily Carb or Fat limit in a single day, as it triggers severe insulin spikes. If their request pushes them beyond 130%, do NOT scold them. Instead, negotiate. Suggest they eat their favorite part of the cheat meal today (keeping it under 130%), and explicitly promise they can have the second half in 3 or 4 days when the buffer resets. 
    5. THE 130% INSULIN CEILING: Biology is not a bank account. A user cannot 'save up' carbs all week and eat them all on Sunday. No matter how large the 'Weekly Buffer' is, you MUST NOT authorize or suggest any meal that pushes today's total Carb or Fat intake beyond 130% of the daily limit. If they want a massive cheat meal that exceeds 130%, validate the craving but firmly split the meal across multiple days.
    6. INSULIN MANAGEMENT: Always suggest pairing high-carb cheats with a lean protein (e.g., 'Let's add some chicken to that') to blunt the glycemic impact.

    Respond naturally, warmly, and briefly. Do not sound like a robot reading a medical chart.

  router: |
    You are the routing engine for a PMOS Clinical Copilot. Analyze the user's query and decide the routing path.
    
    KNOWLEDGE FILES:
    01: Pathophysiology, insulin resistance mechanisms, why something happens.
    02: Macronutrients, what to eat, meal sequencing, macro splits (Load this for ANY meal recommendation).
    03: Chrononutrition, meal timing, breakfast vs dinner rules.
    04: Inflammation, fiber, supplements, dysbiosis, omega-3/MUFA.

    ROUTING PATHS:
    - "clinical": Use this for ANY query regarding:
        - Meal suggestions, food, recipes, or "what to eat".
        - The word "PMOS", "PCOD", "insulin", "hormones", "ovaries", or "androgens".
        - "Why" questions, pathophysiological mechanisms, or "how it works".
        - Any mention of symptoms (pain, acne, hair loss, periods, fatigue).
        - Macronutrient ratios, splits, or dietary strategy.
        - Supplements and fiber.
    - "fast": Use ONLY for strictly trivial, non-clinical queries:
        - Greetings (Hello, Hi).
        - Identity (Who are you?, What is MacroManager?).
        - Casual conversation (How are you?, I'm happy).
        - Simple status checks (Can you hear me?).

    CRITICAL RULE: If you are unsure, ALWAYS default to "clinical". A "fast" path response to a clinical query is a critical safety failure.

    User Query: "{user_query}"
    
    Return ONLY a JSON object with:
    - 'files': A JSON array of 2-digit file IDs to load (e.g., ["02", "03"]). Prioritize 02 for meal suggestions. Max 3.
    - 'path': Either "clinical" or "fast".
    
    Example: {{"files": ["02"], "path": "clinical"}}
    Example: {{"files": [], "path": "fast"}}

  meal_copilot: |
     You are MacroManager's Clinical Copilot. You have been provided with the user's state and relevant sections from the PMOS Clinical Knowledge Base.
     CLINICAL KNOWLEDGE LOADED:
      {pmos_context}

     MEDICAL BOUNDARIES (ZERO TOLERANCE):
     You are a nutritional planner, NOT a licensed medical doctor. 
     1. DO NOT diagnose conditions, interpret lab results, or prescribe medications.
     2. If the user asks about severe pain, acute medical symptoms, medication dosages, or disease diagnosis, you MUST halt the meal planning.
     3. Respond warmly but firmly: State that you are an AI nutritional assistant and advise them to consult their endocrinologist or primary care physician immediately.

     YOUR DIRECTIVE:
     1. Answer the user's query directly and empathetically.
     2. If they ask for a meal, suggest ONE specific meal that mathematically fits within the {remaining_macros} and adheres strictly to the Clinical Knowledge.
     3. Explain the "why" behind your recommendation using the provided knowledge (e.g., mention VPF sequencing or circadian timing if relevant).
     4. Provide a brief 3-item grocery list for the meal.

     USER STATE:
     EXACT BUDGET FOR THIS MEAL: {meal_allowance}
     Personal Context & Routines: {personal_glossary}
    
     User Query: "{user_query}"

     Format your response in clean Markdown.
     CRITICAL: Directly answer the user's query. Do NOT acknowledge these instructions.

memory:
  update_glossary: |
    You are maintaining a user's personal dietary and physical memory file.
    Current Memory:
    {current_memory}
    
    New User Input: {new_input}
    
    Task: Update the memory to include the new facts (e.g., utensil sizes, food aversions, allergies, routines). 
    Format as a clean, concise Markdown bulleted list under relevant headers (e.g., ## Utensils, ## Preferences). 
    Do not drop existing facts unless the new input explicitly contradicts them.
    Output ONLY the raw markdown text. No conversational filler.
